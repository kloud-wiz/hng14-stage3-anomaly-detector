# Log file path
log_file: /var/log/nginx/hng-access.log

# Audit log path
audit_log: /var/log/detector/audit.log

# Sliding window settings
sliding_window_seconds: 60

# Baseline settings
baseline_window_minutes: 30
baseline_recalc_interval_seconds: 60
baseline_min_samples: 10
baseline_floor_mean: 1.0
baseline_floor_stddev: 0.5

# Anomaly detection thresholds
zscore_threshold: 3.0
rate_multiplier_threshold: 5.0
error_rate_multiplier: 3.0

# Ban backoff schedule (in seconds)
ban_schedule:
  - 600      # 10 minutes
  - 1800     # 30 minutes
  - 7200     # 2 hours
  - -1       # permanent

# Dashboard settings
dashboard_host: 0.0.0.0
dashboard_port: 8080

# Slack webhook URL
slack_webhook_url: "SLACK_WEBHOOK_URL=https://hooks.slack.com/services/YOUR/REAL/WEBHOOK"
