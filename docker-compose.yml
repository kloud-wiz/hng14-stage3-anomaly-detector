version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: always

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - nextcloud_data:/var/www/html
    restart: always

  detector:
    build: ./detector
    env_file:
      - .env
    container_name: detector
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: always

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:
